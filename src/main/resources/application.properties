# Ключът се чете от ENV (правило #9 — НЕ в кода/git). Локално: сложи OPENAI_API_KEY.
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-5.4
spring.ai.openai.chat.options.temperature=1

# --- AI Sales Assistant: Claude (Anthropic) провайдър (Фаза 3) ---
# Ключът се чете от ENV (правило #9 — НЕ се пише в кода/git).
# Локално: постави системна променлива ANTHROPIC_API_KEY. Ако е празен, ползва се OpenAI fallback.
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-5}
anthropic.max-tokens=1024
anthropic.base-url=https://api.anthropic.com
anthropic.version=2023-06-01

# --- AI Sales Assistant: Communication Queue (Фаза 4) ---
# ИЗКЛЮЧЕНО изпращане: Фаза 4 само записва в опашката, нищо не се праща на клиенти.
# Реалните доставчици (Email/SMS/WhatsApp + Viber) се включват във Фаза 6.
communication.sending.enabled=false
communication.queue.poll-ms=300000

# --- AI Sales Assistant: Слой за идентичност (анонимен посетител → клиент) ---
# Задържане на анонимни (несвързани) сесии/събития: 90 дни (решение на Асан).
identity.anonymous.retention-days=90
identity.backfill.enabled=true
identity.retention.enabled=true
identity.backfill.batch-size=500

