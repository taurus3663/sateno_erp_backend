# ============================================================================
#  Sateno ERP — Ежедневен автоматичен бекъп на базата (правило 5)
#  Гарантира, че ВИНАГИ има свеж бекъп с днешна дата, независимо от деплоите.
#
#  Изпълнява pg_dump НА СЪРВЪРА по график и проверява, че файлът не е празен.
#  Пази последните N дни бекъпи (по подразбиране 14), трие по-старите.
#
#  Забележка: По-надеждна алтернатива е cron директно на сървъра (виж README),
#  защото не зависи от GitHub. Този workflow е удобен и видим в Actions.
# ============================================================================

name: Daily DB Backup

on:
  schedule:
    - cron: "0 1 * * *"   # всеки ден в 01:00 UTC (≈ 04:00 BG лятно време)
  workflow_dispatch:      # и ръчно при нужда

concurrency:
  group: daily-backup
  cancel-in-progress: false

env:
  SERVER_DIR: /home/erp-b-sateno
  DB_NAME: sateno_erp
  RETENTION_DAYS: "14"

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SERVER_SSH_KEY }}" | tr -d '[:space:]' | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          if [ -n "${{ secrets.SERVER_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.SERVER_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${{ secrets.SERVER_PORT }}" -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          sed -i 's/\r$//' ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          echo "SSH=ssh -i $HOME/.ssh/id_deploy -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" >> $GITHUB_ENV

      - name: Run pg_dump + verify + prune
        run: |
          DATE=$(date +%F)
          BACKUP_DIR="${SERVER_DIR}/backups"
          BACKUP_FILE="${BACKUP_DIR}/sateno_db_${DATE}.sql"
          $SSH "
            set -e
            mkdir -p '${BACKUP_DIR}'
            # peer-аутентикация: postgres печата към stdout, root записва файла.
            cd /tmp && sudo -u postgres pg_dump -d ${DB_NAME} -F p > '${BACKUP_FILE}'
            test -s '${BACKUP_FILE}'
            echo '>>> Бекъп готов:'; ls -lh '${BACKUP_FILE}'
            # Прочистване на бекъпи по-стари от RETENTION_DAYS дни
            find '${BACKUP_DIR}' -name 'sateno_db_*.sql' -type f -mtime +${RETENTION_DAYS} -print -delete
          " || { echo "::error::Дневният бекъп НЕ успя!"; exit 1; }
          echo ">>> Дневен бекъп за ${DATE} — OK."
