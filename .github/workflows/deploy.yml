# ============================================================================
#  Sateno ERP — Backend авто-деплой (LIVE / продукция)
#  Trigger: push към клон `deploy`  →  качване на живо.
#
#  СПАЗВА ПРАВИЛАТА ОТ CLAUDE.md:
#   - Правило 5: БЕКЪП Е ПЪРВА СТЪПКА. Без свеж pg_dump за деня → деплоят СПИРА.
#   - Правило 6: таг на версията + пази се предишен jar за rollback.
#   - Правило 7: при провал на health check → автоматичен rollback. Базата не се пипа.
#   - Правило 8: graceful спиране + атомарна замяна, без прекъсване.
#
#  ВНИМАНИЕ: Това е ЧЕРНОВА. Качва се в GitHub едва след потвърждение от Асан
#  (правило 10) и след като сървър-достъпите са готови.
# ============================================================================

name: Deploy Backend (LIVE)

on:
  push:
    branches: [deploy]
  workflow_dispatch:   # позволява ръчно пускане от GitHub UI (за спешни случаи)

# Никога два деплоя едновременно; не отменяме започнал деплой по средата.
concurrency:
  group: deploy-backend-live
  cancel-in-progress: false

permissions:
  contents: write   # нужно за push на таг на версията

env:
  SERVER_DIR: /home/erp-b-sateno
  JAR_NAME: sateno_b-0.0.1-SNAPSHOT.jar
  DB_NAME: sateno_erp
  HEALTH_PORT: "9494"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # ---------------------------------------------------------------
      # 0) Взимане на кода (клон deploy)
      # ---------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # нужно за тагове

      # ---------------------------------------------------------------
      # 1) Билд на JAR (локално в runner-а, не на сървъра)
      # ---------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        run: mvn -B clean package -DskipTests

      - name: Verify JAR exists
        run: |
          test -s "target/${JAR_NAME}" || { echo "::error::JAR не е намерен/празен е!"; exit 1; }
          ls -lh "target/${JAR_NAME}"

      # ---------------------------------------------------------------
      # 2) SSH подготовка (ключ от GitHub Secrets, known_hosts)
      # ---------------------------------------------------------------
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          # SERVER_SSH_KEY е base64 (един ред) — разкодираме; устойчиво на копиране
          printf '%s' "${{ secrets.SERVER_SSH_KEY }}" | tr -d '[:space:]' | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Закотвяне на host key (по-сигурно от accept-new). Подай SERVER_KNOWN_HOSTS
          # като secret; ако липсва — fallback към keyscan (по-малко сигурно).
          if [ -n "${{ secrets.SERVER_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.SERVER_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${{ secrets.SERVER_PORT }}" -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          sed -i 's/\r$//' ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Define SSH/SCP helpers
        run: |
          echo "SSH=ssh -i $HOME/.ssh/id_deploy -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" >> $GITHUB_ENV
          echo "SCP_PORT=${{ secrets.SERVER_PORT }}" >> $GITHUB_ENV
          echo "TARGET=${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" >> $GITHUB_ENV

      # ---------------------------------------------------------------
      # 3) *** БЕКЪП — ПЪРВА СТЪПКА ПО БАЗАТА (правило 5) ***
      #    Свеж pg_dump за днешния ден. Ако не успее или е празен → СТОП.
      #    Изпълнява се НА СЪРВЪРА (там е PostgreSQL).
      # ---------------------------------------------------------------
      - name: Database backup (ЗАДЪЛЖИТЕЛНО, преди всичко)
        run: |
          DATE=$(date +%F)                       # YYYY-MM-DD
          BACKUP_DIR="${SERVER_DIR}/backups"
          BACKUP_FILE="${BACKUP_DIR}/sateno_db_${DATE}.sql"
          echo ">>> Правя бекъп: ${BACKUP_FILE}"
          $SSH "
            set -e
            mkdir -p '${BACKUP_DIR}'
            # peer-аутентикация: pg_dump като postgres печата към stdout,
            # root записва файла (postgres няма право да пише в /home/erp-b-sateno).
            # Без съхранени пароли. Тествано: работи.
            cd /tmp && sudo -u postgres pg_dump -d ${DB_NAME} -F p > '${BACKUP_FILE}'
            # Проверка: файлът съществува и НЕ е празен
            test -s '${BACKUP_FILE}'
            echo '>>> Размер на бекъпа:'; ls -lh '${BACKUP_FILE}'
          " || { echo "::error::БЕКЪПЪТ НЕ УСПЯ — деплоят СПИРА (правило 5)."; exit 1; }
          echo ">>> Бекъпът за ${DATE} е готов и не е празен. Продължавам."

      # ---------------------------------------------------------------
      # 4) Качване на новия JAR с временно име (старото още работи)
      # ---------------------------------------------------------------
      - name: Upload new JAR (temp name)
        run: |
          scp -i ~/.ssh/id_deploy -P "$SCP_PORT" "target/${JAR_NAME}" "$TARGET:${SERVER_DIR}/${JAR_NAME}.new"
          $SSH "test -s '${SERVER_DIR}/${JAR_NAME}.new'"

      # ---------------------------------------------------------------
      # 5) Запазване на предишния JAR за rollback (правило 6)
      # ---------------------------------------------------------------
      - name: Keep previous JAR for rollback
        run: |
          $SSH "
            if [ -f '${SERVER_DIR}/${JAR_NAME}' ]; then
              cp -f '${SERVER_DIR}/${JAR_NAME}' '${SERVER_DIR}/${JAR_NAME}.prev'
              echo '>>> Запазен предишен JAR като ${JAR_NAME}.prev'
            else
              echo '>>> Няма предишен JAR (първи деплой).'
            fi
          "

      # ---------------------------------------------------------------
      # 6) Деплой: graceful стоп → атомарна замяна → старт (правило 8)
      # ---------------------------------------------------------------
      - name: Deploy (graceful stop, atomic swap, start)
        run: |
          $SSH "bash -s" << 'REMOTE'
            set -e
            JAR_NAME="sateno_b-0.0.1-SNAPSHOT.jar"
            SERVER_DIR="/home/erp-b-sateno"
            PORT="9494"
            cd "$SERVER_DIR"

            echo ">>> Graceful спиране (макс. 10 мин изчакване на активни задачи)..."
            sudo systemctl stop sateno-backend.service || true

            WAITED=0
            while fuser ${PORT}/tcp > /dev/null 2>&1; do
              if [ $WAITED -ge 600 ]; then
                echo ">>> Таймаут 10 мин! Force-kill..."
                fuser -k ${PORT}/tcp || true
                pgrep -f "$JAR_NAME" | xargs -r kill -9 2>/dev/null || true
                break
              fi
              echo ">>> Чакам процесът да приключи... ($WAITED/600 сек)"
              sleep 5; WAITED=$((WAITED+5))
            done

            echo ">>> Атомарна замяна на JAR..."
            mv -f "${JAR_NAME}.new" "${JAR_NAME}"

            echo ">>> Старт..."
            sudo systemctl daemon-reload
            sudo systemctl start sateno-backend.service
          REMOTE

      # ---------------------------------------------------------------
      # 7) Health check — /actuator/health трябва да върне "UP".
      #    Това проверява и че базата е достъпна (не само че процесът слуша).
      # ---------------------------------------------------------------
      - name: Health check
        id: health
        run: |
          set +e
          OK=0
          for i in $(seq 1 24); do   # до 24 опита x 5 сек = 2 мин
            BODY=$($SSH "curl -s --max-time 5 http://localhost:${HEALTH_PORT}/actuator/health || true")
            echo ">>> Опит $i: $BODY"
            case "$BODY" in *'"status":"UP"'*) OK=1; break;; esac
            sleep 5
          done
          ACTIVE=$($SSH "systemctl is-active sateno-backend.service || true")
          echo ">>> systemctl is-active: $ACTIVE"
          if [ "$OK" = "1" ] && [ "$ACTIVE" = "active" ]; then
            echo ">>> Health check OK (status=UP, базата е достъпна)."; exit 0
          else
            echo "::error::Health check ПРОВАЛЕН (няма UP или услугата не е active)."; exit 1
          fi

      # ---------------------------------------------------------------
      # 8) ROLLBACK при провал (правило 7) — връщаме предишния JAR.
      #    Базата НЕ се пипа.
      # ---------------------------------------------------------------
      - name: Rollback on failure
        if: failure() && steps.health.outcome == 'failure'
        run: |
          echo "::warning::Health check се провали — връщам предишната версия."
          $SSH "bash -s" << 'REMOTE'
            set -e
            JAR_NAME="sateno_b-0.0.1-SNAPSHOT.jar"
            SERVER_DIR="/home/erp-b-sateno"
            cd "$SERVER_DIR"
            if [ -f "${JAR_NAME}.prev" ]; then
              sudo systemctl stop sateno-backend.service || true
              sleep 3
              mv -f "${JAR_NAME}.prev" "${JAR_NAME}"
              sudo systemctl start sateno-backend.service
              echo ">>> Rollback завършен. Базата е непокътната."
            else
              echo ">>> Няма ${JAR_NAME}.prev — не мога авто-rollback. Нужна ръчна намеса."
              exit 1
            fi
          REMOTE

      # ---------------------------------------------------------------
      # 9) Таг на версията (само при успех) — за да знаем кое е живо
      # ---------------------------------------------------------------
      - name: Tag released version
        if: success()
        run: |
          TAG="deploy-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag -a "$TAG" -m "Auto-deploy backend $TAG"
          git push origin "$TAG"
          echo ">>> Тагнато: $TAG"
